<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ddd;
        }

        .loader {
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #00c6ff;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #00c6ff;
            color: #000;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
            font-weight: 500;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚧 Coming Soon</h1>
        <p>My portfolio is under construction. Stay tuned for something awesome!</p>

        <div class="loader"></div>

        <a href="#" class="btn">Notify Me</a>

        <footer>
            © 2026 Dhinesh
        </footer>
    </div>

</body>
</html>
